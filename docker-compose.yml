#
# Canopus - production-emulating Docker Compose for the customized Superset image.
#
# This replaces the upstream development compose. It builds the `canopus`
# image target (lean + postgres + clickhouse-connect + baked config/branding),
# runs the app under gunicorn, and uses no source bind-mounts / hot reload.
#
# Usage:
#   cp .env.example .env   # then edit SUPERSET_SECRET_KEY and passwords
#   docker compose up -d --build
#
# Not a hardened production deployment - see README ("What I would change for
# production") for the gap list (TLS, managed DB/Redis, secrets manager, etc.).
#

x-superset-volumes: &superset-volumes
  # ./docker is needed for the bootstrap/init entrypoints; superset_home holds
  # uploaded files and the SQLLab results backend. No app source is mounted.
  - ./docker:/app/docker
  - superset_home:/app/superset_home

x-common-build: &common-build
  context: .
  target: canopus
  cache_from:
    - apache/superset-cache:3.10-slim-trixie

x-common-env: &common-env
  env_file:
    - path: .env
      required: true

services:
  redis:
    image: redis:7
    container_name: canopus_cache
    restart: unless-stopped
    volumes:
      - redis:/data

  db:
    <<: *common-env
    image: postgres:17
    container_name: canopus_db
    restart: unless-stopped
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  superset:
    <<: *common-env
    build: *common-build
    container_name: canopus_app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    user: "root"
    restart: unless-stopped
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes

  superset-init:
    <<: *common-env
    build: *common-build
    container_name: canopus_init
    command: ["/app/docker/canopus/init.sh"]
    user: "root"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes: *superset-volumes
    healthcheck:
      disable: true

  superset-worker:
    <<: *common-env
    build: *common-build
    container_name: canopus_worker
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    user: "root"
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME",
        ]

  superset-worker-beat:
    <<: *common-env
    build: *common-build
    container_name: canopus_worker_beat
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    user: "root"
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes
    healthcheck:
      disable: true

volumes:
  superset_home:
    external: false
  db_home:
    external: false
  redis:
    external: false
